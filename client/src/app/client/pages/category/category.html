<div class="flex flex-row gap-13">

        <!-- Filters -->
        <app-filter class="col-span-1" (filterChange)="onFilterChange($event)"></app-filter>

        <!-- Products -->
        <!-- ✅ Products -->

        <ng-container *ngIf="!isLoading && allProducts.length">
                <app-products-grid [myProducts]="allProducts" [isLoading]="isLoading">

                </app-products-grid>
        </ng-container>

</div>
