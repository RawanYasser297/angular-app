<ng-container *ngFor="let item of [].constructor(count)">
  <div class="animate-pulse bg-white rounded-2xl shadow p-3 space-y-3">
    
    <!-- Image -->
    <div class="bg-gray-200 h-40 rounded-xl"></div>

    <!-- Title -->
    <div class="h-4 bg-gray-200 rounded w-3/4"></div>

    <!-- Price -->
    <div class="h-4 bg-gray-200 rounded w-1/2"></div>

  </div>
</ng-container>
