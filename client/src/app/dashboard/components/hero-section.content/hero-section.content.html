<div class="max-w-2xl mx-auto p-6 bg-white shadow rounded-xl mt-10">

    <h2 class="text-2xl font-bold mb-6 text-center">
        Update Hero Section
    </h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <!-- Title -->
        <div>
            <label class="block mb-1 font-medium">Title</label>
            <input type="text" formControlName="title"
                class="w-full border rounded-lg p-2 focus:ring focus:ring-blue-200" />
        </div>

        <!-- Subtitle -->
        <div>
            <label class="block mb-1 font-medium">Subtitle</label>
            <input type="text" formControlName="subtitle" class="w-full border rounded-lg p-2" />
        </div>


        <!-- File Upload -->
        <div>
            <label class="block text-sm font-medium mb-1">Images</label>
            <input type="file" (change)="onFileChange($event)" accept="image/*" class="w-full border border-gray-300 rounded-lg p-2 
             file:mr-3 file:py-1 file:px-3 file:border-0 
             file:rounded file:bg-blue-100 file:text-blue-700 
             hover:file:bg-blue-200" />
        </div>


        <!-- Preview -->
        <div *ngIf="form.value.backgroundImage" class="mt-4">
            <img [src]="environment.staticFilesURL + form.value.backgroundImage "
                class="w-full h-48 object-cover rounded-lg border" />
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
            Update
        </button>

    </form>
</div>
