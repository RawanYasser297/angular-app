<div class="max-w-3xl mx-auto p-6">
  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="bg-white p-6 rounded-2xl shadow space-y-6"
  >
    <h2 class="text-2xl font-bold">Progress Dashboard</h2>

    <!-- International Brands -->
    <div>
      <label class="font-semibold">International Brands</label>
      <input
        type="text"
        formControlName="internationalBrands"
        class="w-full border p-2 rounded mt-1"
        placeholder="Value"
      />
    </div>

    <!-- High Quality Products -->
    <div>
      <label class="font-semibold">High Quality Products</label>
      <input
        type="text"
        formControlName="highQualityProducts"
        class="w-full border p-2 rounded mt-1"
      />
    </div>

    <!-- Happy Customers -->
    <div>
      <label class="font-semibold">Happy Customers</label>
      <input
        type="text"
        formControlName="happyCustomers"
        class="w-full border p-2 rounded mt-1"
      />
    </div>

    <button
      type="submit"
      class="bg-green-500 text-white px-6 py-2 rounded-xl hover:bg-green-600"
    >
      Save Changes
    </button>
  </form>
</div>
