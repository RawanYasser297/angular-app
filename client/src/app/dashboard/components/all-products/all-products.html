<!-- Filters -->
<div class="flex gap-4 mb-4">

  <!-- Search -->
  <input 
    type="text" 
    placeholder="Search"
    (input)="onSearch($event)"
    class="border p-2 rounded w-1/3"
  >

  <!-- Category -->
  <select 
    (change)="onCategoryChange($event)"
    class="border p-2 rounded"
  >
    <option value="">By Category</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
    <option value="children">Children</option>
    <option value="teen">Teen</option>
  </select>

  <!-- Status -->
  <select 
    (change)="onStatusChange($event)"
    class="border p-2 rounded"
  >
    <option value="">By Status</option>
    <option value="inStock">In Stock</option>
    <option value="outOfStock">Out of Stock</option>
  </select>

</div>

<!-- Table -->
<div class="bg-white shadow rounded-lg overflow-hidden">
  <table class="w-full text-left">
    <thead class="bg-gray-50 border-b">
      <tr>
        <th class="p-3">Product</th>
        <th class="p-3">Category</th>
        <th class="p-3">Price</th>
        <th class="p-3">Stock</th>
        <th class="p-3">Status</th>
        <th class="p-3 text-center">Actions</th>
      </tr>
    </thead>

    <tbody class="w-full table-fixed text-left">
      <tr *ngFor="let product of filteredProducts" class="border-b hover:bg-gray-50">

        <td class="p-3 w-40 max-w-40 truncate">
          <img [src]="environment.staticFilesURL + product.images[0]" class="w-10 h-10 rounded object-cover">
          {{ product.title || ' ' }}
        </td>

        
        <td class="p-3 w-40 max-w-40 truncate">{{ product.category || ' ' }}</td>
        <td class="p-3 w-40 max-w-40 truncate">${{ product.price || ' ' }}</td>
        <td class="p-3 w-40 max-w-40 truncate">{{ product.stock || ' ' }}</td>

        <td class="p-3 w-40 max-w-40 truncate">
          <span [ngClass]="{
                  'bg-green-100 text-green-700': product.status === 'in stock',
                  'bg-yellow-100 text-yellow-700': product.status === 'low stock',
                  'bg-red-100 text-red-700': product.status === 'out of stock'
                }" class="px-2 py-1 rounded text-sm">
            {{ product.status || '' }}
          </span>
        </td>

        <td class="p-3">
          <a [routerLink]="[product.slug]" class="text-blue-600 hover:underline" routerLinkActive="active">
            <img  class="w-10"   src="icons/compose.png" alt="">
          </a>
        </td>

      </tr>
    </tbody>
  </table>
</div>
